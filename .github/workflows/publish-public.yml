name: Publish Runtime to Public Repo

# On tagged releases: push runtime to DisplayXR/displayxr-runtime (public)
# and create a GitHub Release. The DisplayXR Shell ships from
# DisplayXR/displayxr-shell-pvt → displayxr-shell-releases via that
# repo's own publish-shell-releases.yml workflow.
#
# Tag scheme (see docs/roadmap/demo-distribution.md):
#   vX.Y.Z            — full-stack release (back-compat). Both runtime
#                       AND shell get tagged independently with the
#                       same version.
#   runtime/vX.Y.Z    — runtime only; demos unaffected.
#
# The trailing `vX.Y.Z` after the slash is the version that appears on
# the public repos. Env VERSION strips any prefix once per job.

on:
  push:
    tags:
      - 'v*'
      - 'runtime/v*'

permissions:
  contents: read
  actions: read

jobs:
  publish-runtime:
    if: github.repository == 'DisplayXR/displayxr-runtime-pvt'
    runs-on: ubuntu-latest

    steps:
      - name: Mint App installation token (write to public runtime repo)
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.DISPLAYXR_APP_ID }}
          private-key: ${{ secrets.DISPLAYXR_APP_PRIVATE_KEY }}
          owner: DisplayXR
          repositories: displayxr-runtime

      - name: Resolve public release version
        run: |
          # Strip any prefix (e.g. 'runtime/v1.2.0' -> 'v1.2.0'). Back-compat
          # with plain 'vX.Y.Z' tags, which have no slash to strip.
          V="${GITHUB_REF_NAME##*/}"
          echo "VERSION=$V" >> "$GITHUB_ENV"
          echo "Public release tag: $V (from ref_name=$GITHUB_REF_NAME)"

      - name: Checkout tagged commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      # Shell source extraction (Phase 2.J Step 1, 2026-05) moved
      # src/xrt/targets/shell/ to DisplayXR/displayxr-shell-pvt. The
      # runtime repo no longer carries any shell code; the previous
      # "Remove shell code" strip step is now a no-op and removed.

      - name: Push to public runtime repo
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [ -z "$APP_TOKEN" ]; then
            echo "::error::App installation token is empty — secrets DISPLAYXR_APP_ID / DISPLAYXR_APP_PRIVATE_KEY may be missing"
            exit 1
          fi

          git config user.name "DisplayXR Bot"
          git config user.email "noreply@displayxr.org"

          # Stage the deletion
          git add -A
          git commit -m "Release ${{ env.VERSION }} (shell code excluded)" --allow-empty

          # Push to public repo (persist-credentials: false prevents GITHUB_TOKEN override)
          git remote add public "https://x-access-token:${APP_TOKEN}@github.com/DisplayXR/displayxr-runtime.git"
          git push public HEAD:main --force

          # Push the tag
          git tag -f "${{ env.VERSION }}"
          git push public "${{ env.VERSION }}" --force

          echo "Published ${{ env.VERSION }} to DisplayXR/displayxr-runtime"

      - name: Create GitHub Release on public runtime repo
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # Generate release notes from commits since last tag
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log --oneline "$PREV_TAG".."${{ env.VERSION }}" --no-merges | head -50)
          else
            NOTES="Initial release"
          fi

          # Delete existing release if re-running
          gh release delete "${{ env.VERSION }}" --repo DisplayXR/displayxr-runtime --yes 2>/dev/null || true

          gh release create "${{ env.VERSION }}" \
            --repo DisplayXR/displayxr-runtime \
            --title "DisplayXR Runtime ${{ env.VERSION }}" \
            --notes "## What's New

          $NOTES

          ## Installation

          The runtime alone provides OpenXR + WebXR Bridge support.
          For the spatial shell experience, also install the
          [DisplayXR Shell](https://github.com/DisplayXR/displayxr-shell-releases/releases)
          (separate installer; ships from DisplayXR/displayxr-shell-pvt).

          ## License

          Boost Software License 1.0 (BSL-1.0)" \
            --latest

          echo "Created release on DisplayXR/displayxr-runtime"
