name: lint

# Fast checks that run on every PR. Cheap to run, catch class-of-bug
# things that are easy to fix immediately:
#
# - Shell-source guard: this repo MUST NOT contain any files under
#   `src/xrt/targets/shell/` or the deleted `installer/DisplayXRShellInstaller.nsi`.
#   Those moved to DisplayXR/displayxr-shell-pvt during the privacy
#   collapse (commit 7826a97c1, May 2026). Reintroducing them on a
#   feature branch would expose shell source in a public repo. See
#   reference_org_protection_state.md.
#
# - Vendor-docs guard: `docs/vendors/` is an *index* only. Plug-in
#   vendor internals docs live in the vendor's own repo (ADR-019;
#   leia docs migrated to displayxr-leia-plugin/docs/ in June 2026).
#   Only the index README and `sim_display/` (whose driver ships
#   in-tree) are allowed here. Catches stale pre-migration branches
#   re-adding `docs/vendors/leia/` on merge.
#
# Add other lightweight lint jobs here as needed (yaml validity,
# CLAUDE.md presence, etc.).

on:
  pull_request: {}
  # Fire on push to ANY branch (not just main) so accidental pushes of
  # pre-extraction shell content to a feature branch get flagged
  # immediately. Without this, a `git push origin <branch>` that
  # silently restores the deleted `src/xrt/targets/shell/` tree would
  # only surface when a PR was opened.
  push:
    branches:
      - '**'

jobs:
  shell-path-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: No shell source in runtime tree
        run: |
          # Both paths are forbidden. The shell now lives in
          # DisplayXR/displayxr-shell-pvt; the runtime owns no
          # workspace controller of its own.
          MATCHES=$(git ls-files | grep -E '^(src/xrt/targets/shell/|installer/DisplayXRShellInstaller\.nsi$)' || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Shell source files detected in runtime tree:"
            echo "$MATCHES"
            echo ""
            echo "These belong in DisplayXR/displayxr-shell-pvt, not here."
            echo "If you accidentally branched off pre-extraction main, rebase onto"
            echo "current main or run:"
            echo ""
            echo "  git filter-repo --invert-paths --path src/xrt/targets/shell --path installer/DisplayXRShellInstaller.nsi --refs <branch>"
            echo ""
            exit 1
          fi
          echo "Runtime tree is shell-source-free. ✓"

  docs-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: ADR index is up to date
        # The docs/README.md ADR list + docs/adr/README.md are generated from
        # docs/adr/ADR-*.md. A new ADR that isn't re-indexed fails here (this is
        # exactly how ADR-032 drifted out of the index — epic #691 item 10).
        # Regenerate locally with: python3 scripts/gen_adr_index.py
        run: python3 scripts/gen_adr_index.py --check

      - name: No dead relative doc links
        # Flags README-referenced paths that don't exist on disk (moved specs,
        # pruned roadmap docs still linked, a stale ADR filename).
        run: python3 scripts/check_doc_paths.py

  vendor-docs-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: No vendor internals docs in runtime tree
        run: |
          # docs/vendors/ is an index: README.md + sim_display/ only.
          # Plug-in vendor internals belong in the vendor's own repo
          # (e.g. displayxr-leia-plugin/docs/). See ADR-019 and
          # docs/vendors/README.md.
          MATCHES=$(git ls-files docs/vendors/ | grep -vE '^docs/vendors/(README\.md$|sim_display/)' || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Vendor internals docs detected under docs/vendors/:"
            echo "$MATCHES"
            echo ""
            echo "Vendor implementation docs live in the vendor's plug-in repo"
            echo "(leia: displayxr-leia-plugin/docs/), not in the runtime tree."
            echo "If you branched off pre-migration main, rebase onto current main"
            echo "and move the doc to the plug-in repo, then link it from"
            echo "docs/vendors/README.md."
            exit 1
          fi
          echo "docs/vendors/ is index-only. ✓"
