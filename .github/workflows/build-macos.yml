name: Build macOS

on:
  push:
    branches: [cnsdk, XR_EXT_session_target]
  pull_request:

env:
  BUILD_TEST_APP: true
  OPENXR_VERSION: "1.1.43"

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: brew install cmake ninja eigen

      - name: Install Vulkan SDK
        run: |
          set -e
          # Query the latest SDK version from LunarG API
          VULKAN_VERSION=$(curl -s https://vulkan.lunarg.com/sdk/latest/mac.txt)
          echo "Installing Vulkan SDK version: ${VULKAN_VERSION}"
          # Download as zip (LunarG now distributes macOS SDK as zip)
          curl -sSL -o vulkan_sdk.zip "https://sdk.lunarg.com/sdk/download/${VULKAN_VERSION}/mac/vulkan_sdk.zip?Human=true"
          # Verify we got a real zip file
          file vulkan_sdk.zip
          mkdir -p "$HOME/VulkanSDK"
          unzip -q vulkan_sdk.zip -d "$HOME/VulkanSDK"
          # The zip extracts to a versioned directory structure
          # Find the actual SDK root (contains macOS/ subdirectory or is the SDK itself)
          if [ -d "$HOME/VulkanSDK/${VULKAN_VERSION}" ]; then
            SDK_ROOT="$HOME/VulkanSDK/${VULKAN_VERSION}"
          else
            # Find whatever directory was extracted
            SDK_ROOT=$(find "$HOME/VulkanSDK" -maxdepth 2 -name "macOS" -type d | head -1 | xargs dirname)
            if [ -z "$SDK_ROOT" ]; then
              echo "SDK contents:"
              ls -la "$HOME/VulkanSDK/"
              SDK_ROOT="$HOME/VulkanSDK"
            fi
          fi
          # Set up environment - check if macOS subdir exists
          if [ -d "$SDK_ROOT/macOS" ]; then
            echo "VULKAN_SDK=$SDK_ROOT/macOS" >> $GITHUB_ENV
            echo "$SDK_ROOT/macOS/bin" >> $GITHUB_PATH
          else
            echo "VULKAN_SDK=$SDK_ROOT" >> $GITHUB_ENV
            echo "$SDK_ROOT/bin" >> $GITHUB_PATH
          fi
          echo "Vulkan SDK installed at $SDK_ROOT"
          ls -la "$SDK_ROOT/" || echo "Warning: SDK dir listing failed"

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DXRT_FEATURE_SERVICE=ON

      - name: Build
        run: cmake --build build

      - name: Package runtime
        run: |
          mkdir -p _package/SRMonado-macOS/lib
          mkdir -p _package/SRMonado-macOS/share/vulkan/icd.d
          # Find and copy runtime module (.so on macOS for MODULE libraries)
          RUNTIME_LIB=$(find build/src/xrt/targets/openxr -name "libopenxr_monado*" -type f | head -1)
          cp "$RUNTIME_LIB" _package/SRMonado-macOS/lib/
          RUNTIME_BASENAME=$(basename "$RUNTIME_LIB")
          # Bundle Vulkan loader and MoltenVK from SDK
          cp "$VULKAN_SDK/lib/libvulkan.1.dylib" _package/SRMonado-macOS/lib/
          cp "$VULKAN_SDK/lib/libMoltenVK.dylib" _package/SRMonado-macOS/lib/
          # Create MoltenVK ICD manifest pointing to bundled lib
          cat > _package/SRMonado-macOS/share/vulkan/icd.d/MoltenVK_icd.json <<EOF
          {
            "file_format_version": "1.0.0",
            "ICD": {
              "library_path": "../../../lib/libMoltenVK.dylib",
              "api_version": "1.2.0"
            }
          }
          EOF
          # Fix rpaths on the runtime so it finds bundled libvulkan
          install_name_tool -add_rpath @loader_path "$RUNTIME_LIB" 2>/dev/null || true
          install_name_tool -add_rpath @loader_path _package/SRMonado-macOS/lib/"$RUNTIME_BASENAME" 2>/dev/null || true
          # Generate portable manifest with relative library path
          cat > _package/SRMonado-macOS/openxr_monado.json <<EOF
          {
            "file_format_version": "1.0.0",
            "runtime": {
              "name": "Monado (SRMonado macOS)",
              "library_path": "lib/$RUNTIME_BASENAME"
            }
          }
          EOF

      - name: Build OpenXR loader
        if: env.BUILD_TEST_APP == 'true'
        run: |
          git clone --depth 1 --branch release-${{ env.OPENXR_VERSION }} \
            https://github.com/KhronosGroup/OpenXR-SDK-Source.git /tmp/openxr-sdk
          cmake -B /tmp/openxr-sdk/build -S /tmp/openxr-sdk -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/tmp/openxr-install \
            -DBUILD_TESTS=OFF -DBUILD_CONFORMANCE_TESTS=OFF
          cmake --build /tmp/openxr-sdk/build
          cmake --install /tmp/openxr-sdk/build

      - name: Build test app (sim_cube_openxr)
        if: env.BUILD_TEST_APP == 'true'
        run: |
          cmake -B test_apps/sim_cube_openxr/build \
            -S test_apps/sim_cube_openxr -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_PREFIX_PATH=/tmp/openxr-install
          cmake --build test_apps/sim_cube_openxr/build

      - name: Package test app
        if: env.BUILD_TEST_APP == 'true'
        run: |
          mkdir -p _package/SRMonado-macOS/bin
          cp test_apps/sim_cube_openxr/build/sim_cube_openxr _package/SRMonado-macOS/bin/
          # Bundle the OpenXR loader dylib so it works without system install
          cp /tmp/openxr-install/lib/libopenxr_loader*.dylib _package/SRMonado-macOS/lib/
          # Fix rpaths so test app and loader find bundled libvulkan/MoltenVK
          install_name_tool -add_rpath @executable_path/../lib _package/SRMonado-macOS/bin/sim_cube_openxr 2>/dev/null || true
          install_name_tool -add_rpath @loader_path _package/SRMonado-macOS/lib/libopenxr_loader*.dylib 2>/dev/null || true
          # Create run script
          cat > _package/SRMonado-macOS/run_sim_cube.sh <<'SCRIPT'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          export XR_RUNTIME_JSON="$DIR/openxr_monado.json"
          export DYLD_LIBRARY_PATH="$DIR/lib:${DYLD_LIBRARY_PATH:-}"
          export VK_ICD_FILENAMES="$DIR/share/vulkan/icd.d/MoltenVK_icd.json"
          export SIM_DISPLAY_ENABLE=1
          export SIM_DISPLAY_OUTPUT="${SIM_DISPLAY_OUTPUT:-anaglyph}"
          echo "Starting sim_cube_openxr with $SIM_DISPLAY_OUTPUT output..."
          exec "$DIR/bin/sim_cube_openxr" "$@"
          SCRIPT
          chmod +x _package/SRMonado-macOS/run_sim_cube.sh

      - name: Build macOS installer (.pkg)
        run: |
          chmod +x installer/macos/build_installer.sh
          chmod +x installer/macos/create_app_bundle.sh
          ./installer/macos/build_installer.sh _package/SRMonado-macOS _package/SRMonado-Installer.pkg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: SRMonado-macOS
          if-no-files-found: error
          path: |
            _package/SRMonado-macOS/
            _package/SRMonado-Installer.pkg
