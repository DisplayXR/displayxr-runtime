  # Bundle all test apps into a single artifact with per-app subfolders
  BundleTestApps:
    if: ${{ !cancelled() && needs.DetectChanges.outputs.test_apps_changed == 'true' && (github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) }}
    runs-on: ubuntu-latest
    needs: [DetectChanges, TestAppCubeHandleD3D11, TestAppCubeHostedD3D11, TestAppCubeHandleD3D12, TestAppCubeHandleGL, TestAppCubeHandleVK, TestAppCubeTextureD3D11, TestAppCubeTextureD3D12, TestAppCubeHostedLegacyD3D11, TestAppCubeHostedLegacyD3D12, TestAppCubeHostedLegacyVK, TestAppCubeHostedLegacyGL]

    steps:
      - name: Download cube test app artifacts
        uses: actions/download-artifact@v4
        with:
          path: TestApps
          pattern: Cube*

      - name: List bundled contents
        run: |
          echo "Bundled test apps:"
          find TestApps -type f | sort

      - name: Upload bundled test apps
        uses: actions/upload-artifact@v4
        if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        with:
          retention-days: 3
          name: TestApps-${{ github.run_number }}
          if-no-files-found: error
          path: TestApps

      - name: Delete individual test app artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          failOnError: false
          name: |
            CubeHandleD3D11
            CubeHostedD3D11
            CubeHandleD3D12
            CubeHandleGL
            CubeHandleVK
            CubeTextureD3D11
            CubeTextureD3D12
            CubeHostedLegacyD3D11
            CubeHostedLegacyD3D12
            CubeHostedLegacyVK
            CubeHostedLegacyGL
            CubeIpcLegacyD3D11
            CubeIpcD3D11

      # NOTE: per-CI OneDrive upload of the test-apps zip removed. OneDrive
      # now receives release artifacts only, via the bundle meta-installer
      # (DisplayXR/displayxr-installer, publish-bundle.yml). Reviewers use
      # the bundled artifact-upload above; the versioned release zip below
      # still attaches to the GitHub Release on tag.

      # Versioned re-zip for the v* GitHub release (#290). Asset name
      # mirrors the convention from the /release skill — DisplayXR-
      # TestApps-X.Y.Z.zip — so older skill-cut releases and CI-cut
      # releases use identical naming.
      - name: Zip test apps for release (versioned)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd TestApps
          zip -r "../DisplayXR-TestApps-${VERSION}.zip" .
          cd ..
          ls -lh "DisplayXR-TestApps-${VERSION}.zip"

      - name: Attach test apps bundle to GitHub release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: DisplayXR-TestApps-*.zip
          fail_on_unmatched_files: true
          draft: false
          prerelease: false

  # On a v* tag push, after Runtime + BundleTestApps prove the build
  # works end-to-end, observe the new tag in versions.json so the dev
  # orchestrator (scripts/setup-displayxr.{sh,bat}) starts installing
  # this release. Sibling repos use .github/workflows/versions-bump.yml
  # via repository_dispatch for their fields; this job is the runtime's
  # own field-self-bump. See docs/specs/runtime/versions-json-autobump.md.
  #
  # The ABI gate prevents shipping a runtime that breaks the currently-
  # pinned leia_plugin (same class of incident as v1.5.2 vs leia v1.0.5
  # → ADR-020). If ABIs mismatch, we skip the runtime bump and open a
  # tracking issue in the leia repo — the next compatible leia tag will
  # come in via versions-bump.yml and clear the path.
  BumpVersionsJsonOnTag:
    if: ${{ startsWith(github.ref, 'refs/tags/v') && github.repository == 'DisplayXR/displayxr-runtime' }}
    needs: [Runtime, BundleTestApps]
    runs-on: ubuntu-latest
    steps:
      - name: Mint App installation token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.DISPLAYXR_APP_ID }}
          private-key: ${{ secrets.DISPLAYXR_APP_PRIVATE_KEY }}
          owner: DisplayXR
          repositories: |
            displayxr-runtime
            displayxr-installer
            displayxr-leia-plugin
            displayxr-website

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true

      - name: Read current leia_plugin pin
        id: leia
        run: |
          PIN=$(python3 -c 'import json; print(json.load(open("versions.json"))["leia_plugin"])')
          echo "pin=$PIN" >> "$GITHUB_OUTPUT"

      - name: ABI assertion against currently-pinned leia_plugin
        id: abi
        run: |
          set +e
          python3 scripts/check_plugin_abi.py --leia-tag "${{ steps.leia.outputs.pin }}"
          echo "rc=$?" >> "$GITHUB_OUTPUT"

      - name: Open ABI-mismatch issue on leia repo
        if: steps.abi.outputs.rc != '0'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          TITLE="ABI mismatch: leia ${{ steps.leia.outputs.pin }} cannot load runtime ${{ github.ref_name }}"
          BODY=$(cat <<EOF
          Auto-opened by [\`build-windows.yml\`](https://github.com/DisplayXR/displayxr-runtime/actions/runs/${{ github.run_id }}) when runtime tagged \`${{ github.ref_name }}\`.

          The new runtime's \`XRT_PLUGIN_API_VERSION_CURRENT\` (in \`src/xrt/include/xrt/xrt_plugin.h\`) does not match the ABI version the currently-pinned leia plug-in (\`${{ steps.leia.outputs.pin }}\`) was built against.

          The loader would reject this combination at \`xrCreateInstance\` (ADR-020 rule 3), so the runtime's \`versions.json[runtime]\` was **not** bumped. Dev-orchestrator users stay on the previous known-good bundle.

          **To unblock:** rebuild the leia plug-in against runtime \`${{ github.ref_name }}\` (bump \`DXR_RUNTIME_GIT_TAG\` in this repo's \`CMakeLists.txt\`), tag a new release. The leia release's \`versions-bump\` dispatch will then bump leia first; the next runtime tag (or a manual workflow_dispatch on \`versions-bump.yml\` with \`field=runtime\`) will catch up the runtime field.
          EOF
          )
          EXISTING=$(gh issue list --repo DisplayXR/displayxr-leia-plugin \
                       --state open --search "$TITLE in:title" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --repo DisplayXR/displayxr-leia-plugin --body "$BODY"
          else
            gh issue create --repo DisplayXR/displayxr-leia-plugin \
              --title "$TITLE" --body "$BODY" --label "abi-mismatch,automated"
          fi
          echo "::warning::Skipped versions.json[runtime] bump — opened tracking issue in displayxr-leia-plugin."

      - name: Bump versions.json[runtime]
        if: steps.abi.outputs.rc == '0'
        run: |
          python3 - <<'PY'
          import os, re, sys
          path = "versions.json"
          tag  = os.environ["GITHUB_REF_NAME"]
          text = open(path).read()
          # Regex-on-value rewrite preserves the file's existing column
          # alignment / whitespace so the bot's commits don't churn the diff
          # (see versions-bump.yml for the matching rationale).
          pat = re.compile(r'(?m)^(\s*"runtime":\s*")[^"]*(")')
          hits = pat.findall(text)
          if len(hits) != 1:
              sys.exit(f"expected 1 'runtime' occurrence in versions.json, found {len(hits)}")
          new_text = pat.sub(lambda m: m.group(1) + tag + m.group(2), text, count=1)
          if new_text == text:
              print(f"versions.json[runtime] already == {tag}; nothing to do")
              open(".bump-noop", "w").close()
          else:
              print(f"versions.json[runtime] → {tag}")
              open(path, "w").write(new_text)
          PY

      - name: Commit and push
        if: steps.abi.outputs.rc == '0' && hashFiles('.bump-noop') == ''
        run: |
          git config user.name  "displayxr-publish-bot[bot]"
          git config user.email "displayxr-publish-bot@users.noreply.github.com"
          git add versions.json
          git commit -m "chore(versions): bump runtime → ${GITHUB_REF_NAME}

          Auto-bumped by build-windows.yml on tag push.
          [skip ci]"
          git push origin HEAD:main || (git pull --rebase origin main && git push origin HEAD:main)

      # Mirror versions.json to displayxr-installer so the meta-installer
      # bundle composition tracks the runtime self-bump. Schema is identical
      # (see versions-bump.yml's mirror step for rationale).
      - name: Mirror versions.json to displayxr-installer
        if: steps.abi.outputs.rc == '0' && hashFiles('.bump-noop') == ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/DisplayXR/displayxr-installer.git" /tmp/installer
          cp versions.json /tmp/installer/versions.json
          cd /tmp/installer
          if git diff --quiet versions.json; then
            echo "displayxr-installer/versions.json already matches; no mirror commit needed"
            exit 0
          fi
          git config user.name  "displayxr-publish-bot[bot]"
          git config user.email "displayxr-publish-bot@users.noreply.github.com"
          git add versions.json
          git commit -m "chore(versions): mirror runtime → ${GITHUB_REF_NAME} from displayxr-runtime

          Auto-synced from displayxr-runtime/versions.json by build-windows.yml on tag push.
          [skip ci]"
          git push origin HEAD:main || (git pull --rebase origin main && git push origin HEAD:main)

      # Nudge the project website to re-pull org data after a runtime release,
      # mirroring the same step in versions-bump.yml. Non-fatal — a website
      # hiccup must never fail the runtime's self-bump. See docs/org-sync.md
      # in displayxr-website.
      - name: Notify website to resync
        if: steps.abi.outputs.rc == '0' && hashFiles('.bump-noop') == ''
        continue-on-error: true
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: DisplayXR/displayxr-website
          event-type: org-changed
          client-payload: |
            {
              "field":       "runtime",
              "tag":         "${{ github.ref_name }}",
              "source_repo": "DisplayXR/displayxr-runtime"
            }
