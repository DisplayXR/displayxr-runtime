          Invoke-WebRequest -Uri $openxrUrl -OutFile openxr_loader.zip
          Expand-Archive -Path openxr_loader.zip -DestinationPath openxr_sdk -Force

      - name: Build D3D12 test app (cube_handle_d3d12_win)
        run: |
          cd test_apps/cube_handle_d3d12_win
          cmake -S . -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DOpenXR_ROOT="${{ github.workspace }}/openxr_sdk"
          cmake --build build

      - name: Copy required DLLs
        run: |
          $loaderDll = Get-ChildItem -Path openxr_sdk -Recurse -Filter "openxr_loader.dll" | Where-Object { $_.FullName -like "*x64*" } | Select-Object -First 1
          if (-not $loaderDll) {
            $loaderDll = Get-ChildItem -Path openxr_sdk -Recurse -Filter "openxr_loader.dll" | Select-Object -First 1
          }
          if ($loaderDll) {
            Copy-Item $loaderDll.FullName -Destination test_apps/cube_handle_d3d12_win/build/
          }

      - name: Upload D3D12 test app
        uses: actions/upload-artifact@v4
        if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        with:
          retention-days: 3
          name: CubeHandleD3D12
          if-no-files-found: error
          path: |
            test_apps/cube_handle_d3d12_win/build/cube_handle_d3d12_win.exe
            test_apps/cube_handle_d3d12_win/build/*.dll
            test_apps/cube_handle_d3d12_win/build/textures/

  # OpenGL test app with XR_EXT_win32_window_binding
  TestAppCubeHandleGL:
    if: needs.DetectChanges.outputs.test_apps_changed == 'true'
    runs-on: windows-2022
    needs: [Runtime, DetectChanges]

    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download runtime artifacts
        uses: actions/download-artifact@v4
