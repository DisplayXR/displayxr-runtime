name: Build Windows

on:
  # Public-repo CI policy: fire freely. CI is free for public repos on
  # GitHub-hosted runners, so we optimize for contributor experience
  # rather than minute-burn:
  # - Drafts run CI too. Contributors get fast feedback without the
  #   Ready-for-review handshake.
  # - Push to main fires the workflow as a sanity check (catches the
  #   rare admin-bypass merge that lands red).
  # - Doc-only PRs are detected by DetectChanges (`docs_only` output);
  #   the heavy steps skip when true, but the workflow still fires and
  #   Runtime still reports a status so branch protection's required-
  #   status-check on `Runtime` is satisfied. Saves wall-clock time +
  #   keeps logs clean even if not money.
  # - Rapid pushes to a PR cancel the in-progress run; only the latest
  #   commit's CI completes (concurrency group below).
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request: {}

# Cancel any in-progress run for the same PR (or branch) when a new
# push comes in. Only the latest commit's CI completes.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  DetectChanges:
    runs-on: ubuntu-latest
    outputs:
      test_apps_changed: ${{ steps.filter.outputs.test_apps }}
      docs_only: ${{ steps.filter.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full clone — the diff below uses pull_request.base.sha,
          # which can be older than the merge commit's first parent
          # (PR base lags main after a main push). Shallow clones miss
          # those refs and the diff fails with "fatal: bad object".
          # This job only does git plumbing, so the clone is cheap.
          fetch-depth: 0
      - id: filter
        run: |
          # Tag pushes are releases — always build test apps + demos so the
          # per-demo publish workflows can attach binary zips to releases.
          # github.event.before is all-zeros on tag pushes, so the diff-based
          # path below would miss this case.
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "test_apps=true" >> "$GITHUB_OUTPUT"
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            echo "Detected tag push — forcing test_apps_changed=true, docs_only=false"
            exit 0
          fi
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE=${{ github.event.pull_request.base.sha }}
          else
            BASE=${{ github.event.before }}
          fi
          CHANGED=$(git diff --name-only "$BASE" HEAD)
          # test_apps_changed: any test_apps/ or demos/ files modified.
          if echo "$CHANGED" | grep -qE '^(test_apps/|demos/)'; then
            echo "test_apps=true" >> "$GITHUB_OUTPUT"
          else
            echo "test_apps=false" >> "$GITHUB_OUTPUT"
          fi
          # docs_only: every changed file matches doc / boilerplate patterns.
          # When true, Runtime (and downstream test-app jobs) still RUN — to
          # report a status for branch protection — but skip their heavy
          # steps via per-step `if:`.
          NON_DOC=$(echo "$CHANGED" | grep -vE '^(docs/|.*\.md$|LICENSE$|\.github/ISSUE_TEMPLATE/)' || true)
          if [ -n "$CHANGED" ] && [ -z "$NON_DOC" ]; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Detected test_apps_changed=$(grep ^test_apps= "$GITHUB_OUTPUT" | cut -d= -f2) docs_only=$(grep ^docs_only= "$GITHUB_OUTPUT" | cut -d= -f2)"

  Runtime:
    # Always runs on PRs (drafts included) and main pushes so it can
    # report a status check; heavy steps below skip when DetectChanges
    # flagged the PR as docs_only. Free CI for public repos.
    needs: DetectChanges
    runs-on: windows-2022

    env:
      GH_TOKEN: ${{ github.token }}
      DOCS_ONLY: ${{ needs.DetectChanges.outputs.docs_only }}

    steps:

      - name: Checkout repository and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true

      - name: Doc-only PR — skipping heavy build steps
        if: needs.DetectChanges.outputs.docs_only == 'true'
        run: echo "DetectChanges flagged docs_only=true; the steps below skip and the Runtime job reports a success status without running the full Windows build."

      # No vendor SDK fetch — the runtime DLL holds zero vendor identifiers
      # in its link line (ADR-019). Vendor drv_* implementations ship from
      # separate repos as plug-in DLLs (see DisplayXR/displayxr-leia-plugin
      # and docs/guides/vendor-plugin-onboarding.md).

      - name: Restore from cache and setup vcpkg executable and data files.
        if: needs.DetectChanges.outputs.docs_only != 'true'
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgGitCommitId: '5d90b0d5d0317336e65662f2bf0d671b0902c632'
          vcpkgJsonGlob: 'vcpkg.json'

      - name: Install Vulkan SDK
        if: needs.DetectChanges.outputs.docs_only != 'true'
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.3.283.0
          cache: true

      - if: needs.DetectChanges.outputs.docs_only != 'true'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install OpenXR loader
        if: needs.DetectChanges.outputs.docs_only != 'true'
        run: |
          # displayxr-webxr-bridge is an OpenXR client and links the loader.
          # src/xrt/targets/webxr_bridge/CMakeLists.txt early-returns if the
          # loader can't be found via find_package or OpenXR_ROOT — which
          # drops both the bridge and the install(FILES openxr_loader.dll)
          # rule from the build, leaving the installer without those files.
          $openxrVersion = "1.1.43"
          $openxrUrl = "https://github.com/KhronosGroup/OpenXR-SDK-Source/releases/download/release-$openxrVersion/openxr_loader_windows-$openxrVersion.zip"
          Invoke-WebRequest -Uri $openxrUrl -OutFile openxr_loader.zip
          Expand-Archive -Path openxr_loader.zip -DestinationPath openxr_sdk -Force

      # Sync CMakeLists.txt VERSION to the most recent vX.Y.Z tag on every
      # run. The installer's OutFile name comes from CMake's project(VERSION),
      # which is wired through installer/CMakeLists.txt → NSIS as
      # `DisplayXRSetup-${VERSION}.${BUILD_NUM}.exe`. Without this, the
      # source-tree VERSION drives the filename on PR / main builds — easy
      # to drift if /release ever forgets to bump it before tagging
      # (cf. displayxr-shell-pvt#33, where source pinned at 1.2.3 while the
      # latest tag was v1.3.0, producing `DisplayXRShellSetup-1.2.3.<run>.exe`
      # in every PR artifact).
      #
      # `git describe --tags --abbrev=0 --match 'v[0-9]*'` resolves to the
      # exact tag on tag pushes and the most recent matching tag on every
      # other commit, so the same step covers PRs, main pushes, and tag
      # pushes. /release can stop manually bumping CMakeLists.txt — CI is
      # authoritative.
      - name: Sync CMake VERSION from latest vX.Y.Z tag
        if: needs.DetectChanges.outputs.docs_only != 'true'
        shell: pwsh
        run: |
          # actions/checkout's default fetch-depth is 1 and skips tags; pull
          # in just the tag refs (no extra commit history) so describe works.
          git fetch --depth=1 origin '+refs/tags/*:refs/tags/*' 2>$null

          $tag = (git describe --tags --abbrev=0 --match 'v[0-9]*' 2>$null)
          if (-not $tag) {
            Write-Host "No vX.Y.Z tag reachable — leaving CMakeLists.txt unchanged"
            exit 0
          }
          if ($tag -notmatch '^v(\d+\.\d+\.\d+)$') {
            Write-Host "Latest tag '$tag' is not vX.Y.Z — leaving CMakeLists.txt unchanged"
            exit 0
          }
          $ver = $Matches[1]
          Write-Host "Patching CMakeLists.txt VERSION to $ver (from tag $tag, ref=$env:GITHUB_REF)"
          # Line-by-line rewrite avoids .NET regex's `$1`-followed-by-digit
          # parser ambiguity (e.g. `$1.2.4` → it tries `$11` first); see the
          # shell-pvt sibling step for the original encounter.
          $out = Get-Content CMakeLists.txt | ForEach-Object {
            if ($_ -match '^(\s*)VERSION\s+\d+\.\d+\.\d+(\s*)$') {
              "$($Matches[1])VERSION $ver$($Matches[2])"
            } else {
              $_
            }
          }
          Set-Content -Path CMakeLists.txt -Value $out -Encoding UTF8
          Select-String -Path CMakeLists.txt -Pattern '^\s*VERSION\s+\d+\.\d+\.\d+\s*$' | Select-Object -First 1

      - name: Generate
        if: needs.DetectChanges.outputs.docs_only != 'true'
        run: |
          cmake -S . -B build -G "Ninja Multi-Config" `
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_MANIFEST_FEATURES=gui `
            -DX_VCPKG_APPLOCAL_DEPS_INSTALL=ON `
            -DCMAKE_INSTALL_PREFIX=_package `
            -DXRT_BUILD_INSTALLER=ON `
            -DXRT_FEATURE_SERVICE=ON `
            -DXRT_FEATURE_HYBRID_MODE=ON `
            -DOpenXR_ROOT="${{ github.workspace }}/openxr_sdk" `
            -DBUILD_NUM="${{ github.run_number }}"

      - name: Build
        if: needs.DetectChanges.outputs.docs_only != 'true'
        run: cmake --build build --config Release --target install

      # ADR-019 / issues #256 & #263 — the runtime DLL must hold zero
      # vendor identifiers in its link line. drv_leia lives in its own
      # repo (DisplayXR/displayxr-leia-plugin) post-#263 and the runtime
      # tree has no SR source at all. DisplayXRClient.dll should
      # import nothing matching `SimulatedReality*`. This step is a
      # permanent tripwire: catches accidental re-introduction of a
      # vendor static-link path or a new transitive dep dragging the
      # SR libs back in — at PR time, before any artifact ships.
      - name: Assert runtime DLL has zero vendor identifiers
        if: needs.DetectChanges.outputs.docs_only != 'true'
        shell: pwsh
        run: |
          $dll = "_package/bin/DisplayXRClient.dll"
          if (-not (Test-Path $dll)) {
            Write-Host "::error::$dll missing — runtime build did not produce expected artifact."
            exit 1
          }
          $sr = & dumpbin /imports $dll 2>&1 | Select-String -Pattern "SimulatedReality"
          if ($sr) {
            Write-Host "::error::ADR-019 regression — DisplayXRClient.dll has SimulatedReality static imports:"
            $sr | ForEach-Object { Write-Host "  $_" }
            Write-Host "Fix: drop the offending drv_leia / SR library link from the runtime DLL's link line. Vendor code belongs in the DisplayXR-LeiaSR.dll plug-in (see docs/adr/ADR-019-vendor-plugin-aux-boundary.md)."
            exit 1
          }
          Write-Host "PASS: runtime DLL has zero SimulatedReality imports (ADR-019 §2.1 holds)."
          # Also assert that the plug-in DLL we expect IS shipped — guards
          # against a CMake regression that silently drops the plug-in.
          $plugin = "_package/bin/plugins/DisplayXR-SimDisplay.dll"
          if (-not (Test-Path $plugin)) {
            Write-Host "::error::$plugin missing — sim-display plug-in did not build."
            exit 1
          }
          $exports = & dumpbin /exports $plugin 2>&1 | Select-String -Pattern "xrtPluginNegotiate"
          if (-not $exports) {
            Write-Host "::error::$plugin missing xrtPluginNegotiate export (ADR-019 contract — exactly one symbol)."
            exit 1
          }
          Write-Host "PASS: sim-display plug-in built and exports xrtPluginNegotiate."

      # First runtime EXECUTION smoke test in CI. Every other job only builds.
      # `displayxr-cli selftest` creates an instance + system devices headlessly
      # (no compositor, no GPU, no window), discovers the display processor via
      # the REAL registry path, and validates the display info the plug-in
      # reports. Its exit code is the gate. This isolates plug-in discovery /
      # ABI / display-info failures from compositor+GPU ones and catches the
      # ABI-drift class of bugs (cf. ADR-020) at PR time.
      - name: Headless self-test (displayxr-cli selftest)
        if: needs.DetectChanges.outputs.docs_only != 'true'
        shell: pwsh
        run: |
          $cli = "_package/bin/displayxr-cli.exe"
          if (-not (Test-Path $cli)) {
            Write-Host "::error::$cli missing — CLI did not build."
            exit 1
          }
          $plugin = (Resolve-Path "_package/bin/plugins/DisplayXR-SimDisplay.dll").Path
          # Windows plug-in discovery is registry-only (no env override), so
          # register the just-built sim-display plug-in exactly as the runtime
          # installer would. GitHub runners run as admin — the HKLM write needs
          # no elevation prompt. Cleaned up in the finally block.
          $key = "HKLM\Software\DisplayXR\DisplayProcessors\sim-display"
          reg add $key /v Binary /t REG_SZ /d "$plugin" /f | Out-Null
          reg add $key /v ProbeOrder /t REG_DWORD /d 200 /f | Out-Null
          reg add $key /v DisplayName /t REG_SZ /d "Simulated 3D Display" /f | Out-Null
          try {
            & $cli selftest
            $code = $LASTEXITCODE

            # Phase 3a (#387): exercise the per-display claim/resolution path.
            # `selftest` uses target_instance_no_comp, which does NOT build the
            # registry; `displays --claims` loads the plug-in(s), enumerates EDID,
            # and runs target_plugin_resolve_displays. With sim-display registered
            # it claims every enumerated monitor at FALLBACK, so every monitor must
            # resolve → claimed_count == monitor_count (trivially 0 == 0 on a
            # headless runner with no EDID monitors; non-trivial on a real panel).
            # Robust JSON extraction: drop stderr logs, slice first '{'..last '}'.
            if ($code -eq 0) {
              $raw = (& $cli displays --claims --json 2>$null | Out-String)
              $claimsCode = $LASTEXITCODE
              if ($claimsCode -ne 0) {
                Write-Host "::error::displayxr-cli displays --claims exited $claimsCode."
                $code = $claimsCode
              } else {
                $s = $raw.IndexOf('{'); $e = $raw.LastIndexOf('}')
                if ($s -lt 0 -or $e -le $s) {
                  Write-Host "::error::displays --claims emitted no JSON object. Output: $raw"
                  $code = 1
                } else {
                  $obj = $raw.Substring($s, $e - $s + 1) | ConvertFrom-Json
                  $mon = [int]$obj.monitor_count
                  $clm = [int]$obj.claimed_count
                  if ($clm -ne $mon) {
                    Write-Host "::error::displays --claims: only $clm/$mon monitor(s) resolved to a plug-in — sim-display must claim every monitor (FALLBACK). Registry resolution path regression (#387/#69)."
                    $code = 1
                  } else {
                    Write-Host "PASS: displays --claims resolved $clm/$mon monitor(s) (registry resolution path)."
                  }
                }
              }
            }
          } finally {
            reg delete $key /f | Out-Null
          }
          if ($code -ne 0) {
            Write-Host "::error::displayxr-cli headless gate failed (exit $code) — the runtime could not discover a display processor, reported invalid display info, or the per-display claim resolution was inconsistent. See the output above."
            exit $code
          }
          Write-Host "PASS: headless self-test + per-display claim resolution succeeded."

      - name: Build Installer
        if: needs.DetectChanges.outputs.docs_only != 'true'
        run: cmake --build build --config Release --target installer

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: needs.DetectChanges.outputs.docs_only != 'true' && (github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        id: artifact-upload-step
        with:
          retention-days: 3
          name: DisplayXR
          if-no-files-found: error
          path: _package

      - name: Upload installer
        uses: actions/upload-artifact@v4
        if: needs.DetectChanges.outputs.docs_only != 'true' && (github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        id: installer-upload-step
        with:
          retention-days: 3
          name: DisplayXR-Installer
          if-no-files-found: error
          path: _package/DisplayXRSetup-*.exe

      # Attach the Windows installer to the v* GitHub release (#290).
      # First workflow to complete on the tag creates the release;
      # subsequent ones (macOS BuildInstaller, BundleTestApps) append
      # their artifacts. Filename is DisplayXRSetup-X.Y.Z.BUILD.exe
      # from the NSI's OutFile.
      - name: Attach Windows installer to GitHub release on tag
        if: needs.DetectChanges.outputs.docs_only != 'true' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: _package/DisplayXRSetup-*.exe
          fail_on_unmatched_files: true
          draft: false
          prerelease: false

      # NOTE: per-CI OneDrive upload removed. Build artifacts are no longer
      # pushed to OneDrive on every run — the *bundle* meta-installer
      # (DisplayXR/displayxr-installer, publish-bundle.yml) uploads to
      # OneDrive on release only. Reviewers use the upload-artifact steps
      # above; release assets attach to the GitHub Release on tag.

  # D3D11 test app with XR_EXT_win32_window_binding (app provides window handle)
  TestAppCubeHandleD3D11:
    if: needs.DetectChanges.outputs.test_apps_changed == 'true'
    runs-on: windows-2022
    needs: [Runtime, DetectChanges]  # Wait for runtime build to get artifacts

    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download runtime artifacts
        uses: actions/download-artifact@v4
        with:
          name: DisplayXR
          path: runtime

      - name: List runtime artifacts
        run: |
          Write-Host "Runtime directory contents:"
          Get-ChildItem -Recurse runtime | Select-Object FullName

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install OpenXR loader
        run: |
          # Download and extract OpenXR SDK
          $openxrVersion = "1.1.43"
          $openxrUrl = "https://github.com/KhronosGroup/OpenXR-SDK-Source/releases/download/release-$openxrVersion/openxr_loader_windows-$openxrVersion.zip"
          Write-Host "Downloading OpenXR loader from $openxrUrl"
          Invoke-WebRequest -Uri $openxrUrl -OutFile openxr_loader.zip
          Expand-Archive -Path openxr_loader.zip -DestinationPath openxr_sdk -Force
          Write-Host "OpenXR SDK contents:"
          Get-ChildItem -Recurse openxr_sdk | Select-Object FullName

      - name: Build D3D11 test app (cube_handle_d3d11_win)
        run: |
          cd test_apps/cube_handle_d3d11_win
          cmake -S . -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DOpenXR_ROOT="${{ github.workspace }}/openxr_sdk"
          cmake --build build

      - name: Copy required DLLs to test app build
        run: |
          # Explicitly use the x64 OpenXR loader DLL
          $loaderDll = Get-ChildItem -Path openxr_sdk -Recurse -Filter "openxr_loader.dll" | Where-Object { $_.FullName -like "*x64*" } | Select-Object -First 1
          if (-not $loaderDll) {
            # Fallback to any loader if x64 path not found
            $loaderDll = Get-ChildItem -Path openxr_sdk -Recurse -Filter "openxr_loader.dll" | Select-Object -First 1
          }
          if ($loaderDll) {
            Copy-Item $loaderDll.FullName -Destination test_apps/cube_handle_d3d11_win/build/
            Write-Host "Copied $($loaderDll.FullName) to test app build"
          } else {
            Write-Host "Warning: openxr_loader.dll not found"
          }

          # NOTE: D3DCompiler_47.dll is a Windows system component available since Win8.
          # We do NOT bundle it - the app will use the system version.
          # Bundling caused 0xc000007b errors on some systems.
          Write-Host "Not bundling D3DCompiler_47.dll - will use system version"

      - name: Verify binary architectures
        run: |
          Write-Host "=== Checking binary architectures ==="
          $exe = "test_apps/cube_handle_d3d11_win/build/cube_handle_d3d11_win.exe"
          $dll = "test_apps/cube_handle_d3d11_win/build/openxr_loader.dll"

          Write-Host "`nEXE architecture:"
          dumpbin /headers $exe | Select-String -Pattern "machine \(|File Type:"

          Write-Host "`nDLL architecture:"
          dumpbin /headers $dll | Select-String -Pattern "machine \(|File Type:"

          Write-Host "`nDependencies of EXE:"
          dumpbin /dependents $exe

          Write-Host "`nDependencies of openxr_loader.dll:"
          dumpbin /dependents $dll

          Write-Host "`nAll DLLs in build directory:"
          Get-ChildItem test_apps/cube_handle_d3d11_win/build/*.dll | ForEach-Object { Write-Host "  $($_.Name)" }

      - name: Upload test app
        uses: actions/upload-artifact@v4
        if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        with:
          retention-days: 3
          name: CubeHandleD3D11
          if-no-files-found: error
          path: |
            test_apps/cube_handle_d3d11_win/build/cube_handle_d3d11_win.exe
            test_apps/cube_handle_d3d11_win/build/*.dll
            test_apps/cube_handle_d3d11_win/build/textures/

  # D3D11 hosted test app - Standard OpenXR app (runtime creates window)
  TestAppCubeHostedD3D11:
    if: needs.DetectChanges.outputs.test_apps_changed == 'true'
    runs-on: windows-2022
    needs: [Runtime, DetectChanges]

    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download runtime artifacts
        uses: actions/download-artifact@v4
        with:
          name: DisplayXR
          path: runtime

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install OpenXR loader
        run: |
          $openxrVersion = "1.1.43"
          $openxrUrl = "https://github.com/KhronosGroup/OpenXR-SDK-Source/releases/download/release-$openxrVersion/openxr_loader_windows-$openxrVersion.zip"
          Invoke-WebRequest -Uri $openxrUrl -OutFile openxr_loader.zip
          Expand-Archive -Path openxr_loader.zip -DestinationPath openxr_sdk -Force

      - name: Build D3D11 hosted test app (cube_hosted_d3d11_win)
        run: |
          cd test_apps/cube_hosted_d3d11_win
          cmake -S . -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DOpenXR_ROOT="${{ github.workspace }}/openxr_sdk"
          cmake --build build

      - name: Copy required DLLs
        run: |
          $loaderDll = Get-ChildItem -Path openxr_sdk -Recurse -Filter "openxr_loader.dll" | Where-Object { $_.FullName -like "*x64*" } | Select-Object -First 1
          if (-not $loaderDll) {
            $loaderDll = Get-ChildItem -Path openxr_sdk -Recurse -Filter "openxr_loader.dll" | Select-Object -First 1
          }
          if ($loaderDll) {
            Copy-Item $loaderDll.FullName -Destination test_apps/cube_hosted_d3d11_win/build/
          }

      - name: Upload D3D11 hosted test app
        uses: actions/upload-artifact@v4
        if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        with:
          retention-days: 3
          name: CubeHostedD3D11
          if-no-files-found: error
          path: |
            test_apps/cube_hosted_d3d11_win/build/cube_hosted_d3d11_win.exe
            test_apps/cube_hosted_d3d11_win/build/*.dll
            test_apps/cube_hosted_d3d11_win/build/textures/

  # D3D12 test app with XR_EXT_win32_window_binding
  TestAppCubeHandleD3D12:
    if: needs.DetectChanges.outputs.test_apps_changed == 'true'
    runs-on: windows-2022
    needs: [Runtime, DetectChanges]

    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download runtime artifacts
        uses: actions/download-artifact@v4
        with:
          name: DisplayXR
          path: runtime

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install OpenXR loader
        run: |
          $openxrVersion = "1.1.43"
          $openxrUrl = "https://github.com/KhronosGroup/OpenXR-SDK-Source/releases/download/release-$openxrVersion/openxr_loader_windows-$openxrVersion.zip"
          Invoke-WebRequest -Uri $openxrUrl -OutFile openxr_loader.zip
          Expand-Archive -Path openxr_loader.zip -DestinationPath openxr_sdk -Force

      - name: Build D3D12 test app (cube_handle_d3d12_win)
        run: |
          cd test_apps/cube_handle_d3d12_win
          cmake -S . -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DOpenXR_ROOT="${{ github.workspace }}/openxr_sdk"
          cmake --build build

